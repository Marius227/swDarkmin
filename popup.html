<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Shopware Dark Mode</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      background: #18181b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo {
      width: 48px;
      height: auto;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fafafa;
    }

    .subtitle {
      font-size: 11px;
      color: #71717a;
      margin-top: 2px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #27272a;
      border-radius: 10px;
      padding: 14px 16px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #52525b;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider {
      background: #8b5cf6;
    }

    input:checked + .slider::before {
      transform: translateX(20px);
    }

    .status {
      margin-top: 12px;
      font-size: 11px;
      color: #52525b;
      text-align: center;
    }

    .status.active {
      color: #8b5cf6;
    }
  </style>
</head>
<body>
  <div class="header">
    <img class="logo" src="icons/darkmin-square.png" alt="swDarkmin">
    <div>
      <h1>Shopware Dark Mode</h1>
      <div class="subtitle">Admin Area</div>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Dark Mode</span>
    <label class="toggle">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="status" id="status">Not on an admin page</div>

  <script src="popup.js"></script>
</body>
</html>
